name: ci

# Build + test gate for pull requests and pushes to main. Make this a required
# status check in the branch ruleset so nothing merges to main without it.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # CGO is on by default on the ubuntu runner; tu-agent links mattn/go-sqlite3
      # and compiles SQLite's FTS5 module via the sqlite_fts5 build tag.
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: vet
        run: go vet -tags sqlite_fts5 ./...

      - name: test
        run: go test -race -tags sqlite_fts5 ./...

      - name: lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: --build-tags sqlite_fts5
